            <?php if($success): ?>
                <div style="text-align: center;">
                    <p class="success"><?= $t['password_updated_success'] ?></p>
                    <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 15px;">
                        Redirecting to login in <span id="countdown">5</span> seconds...
                    </p>
                    <a href="login" style="color: #00d4ff; text-decoration: none; display: block; margin-top: 10px; font-weight: 600;"><?= $t['go_to_login'] ?></a>

                <script>
                    let seconds = 5;
                    const countdownEl = document.getElementById('countdown');
                    const timer = setInterval(() => {
                        seconds--;
                        countdownEl.textContent = seconds;
                        if (seconds <= 0) clearInterval(timer);
                    }, 1000);
                </script>
            <?php else: ?>
                <?php if($error): ?> <p class="error"><?= $error ?></p> <?php endif; ?>
                <form method="POST" id="resetForm" onsubmit="return validateForm()">
                    <input type="hidden" name="csrf_token" value="<?= $csrf_token ?>">
                    <div class="password-wrapper">
                        <input type="password" name="password" id="new_password" placeholder="<?= $t['new_pass'] ?>" required oninput="checkStrength(this.value)">
                        <span class="toggle-password" onclick="toggleVisibility(this, 'new_password')">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>
                    <p class="field-hint" style="color: rgba(255,255,255,0.5); font-size: 0.8rem; margin: 5px 0 15px; text-align: left; padding-left: 5px;"><?= $t['pass_hint'] ?></p>

                    <div id="password-strength"><div id="strength-bar"></div></div>

                    <div class="password-wrapper" style="margin-top: 15px;">
                        <input type="password" name="confirm_password" id="confirm_password" placeholder="<?= $t['confirm_pass'] ?>" required>
                        <span class="toggle-password" onclick="toggleVisibility(this, 'confirm_password')">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>

                    <button type="submit"><?= $t['update_pass'] ?></button>
                </form>

                <script>
                let currentScore = 0;

                function toggleVisibility(btn, inputId) {
                    const input = document.getElementById(inputId);
                    const icon = btn.querySelector('i');
                    const isPassword = input.type === "password";

                    input.type = isPassword ? "text" : "password";
                    if (isPassword) {
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash'); // Change to eye-slash icon
                    } else {
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye'); // Change to eye icon
                    }
                }

                function validateForm() {
                    // Block submission if score is less than 3 (Medium strength)
                    if (currentScore < 3) {
                        alert("Password is too weak. Please include a mix of uppercase letters, numbers, and symbols.");
                        return false;
                    }
                    return true;
                }

                function checkStrength(pass) {
                    const bar = document.getElementById('strength-bar');
                    currentScore = 0;
                    if (!pass) { bar.style.width = '0%'; return; }
                    
                    if (pass.length >= 8) currentScore++;
                    if (/[A-Z]/.test(pass)) currentScore++;
                    if (/[0-9]/.test(pass)) currentScore++;
                    if (/[^A-Za-z0-9]/.test(pass)) currentScore++;

                    const colors = ['#ff5c5c', '#ffa500', '#00d4ff', '#4cff88'];
                    const widths = ['25%', '50%', '75%', '100%'];
                    
                    if (currentScore > 0) {
                        bar.style.width = widths[currentScore - 1];
                        bar.style.background = colors[currentScore - 1];
                    } else {
                        bar.style.width = '10%';
                        bar.style.background = colors[0];
                    }
                }
                </script>
            <?php endif; ?>
        </div>
    </div>

    <?php include 'api/footer.php'; ?>
</body>
</html>
