<script>

// Toggle password visibility
function togglePass(id){
    const el = document.getElementById(id);
    el.type = el.type === "password" ? "text" : "password";
}

// Password strength meter
const newPasswordInput = document.getElementById('new_password');
const strengthBar = document.getElementById('strength-bar');

newPasswordInput.addEventListener('input', () => {
    let v = newPasswordInput.value;
    let s = 0; // strength score

    if (v.length >= 6) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/\d/.test(v)) s++;
    if (/[\W_]/.test(v)) s++; // \W matches non-alphanumeric, _ is included in that

    strengthBar.style.width = (s * 25) + "%";
    strengthBar.style.backgroundColor =
        s <= 1 ? "red" :
        s == 2 ? "orange" :
        s == 3 ? "yellow" : "#00d4ff";
});

const handleForm = (formId, endpoint) => {
    document.getElementById(formId).onsubmit = function(e) {
        e.preventDefault();
        const msgDiv = document.getElementById('profileMsg');
        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(r => r.json())
        .then(res => {
            msgDiv.innerText = res.message;
            msgDiv.className = 'status-msg ' + (res.success ? 'success' : 'error');
            if(res.success && formId === 'passwordForm') {
                this.reset();
                strengthBar.style.width = "0%"; // Reset strength bar
            }
        })
        .catch(() => {
            msgDiv.innerText = "Connection error.";
            msgDiv.className = 'status-msg error';
        });
    };
};

handleForm('profileForm', 'api/update_profile.php?action=info');
handleForm('passwordForm', 'api/update_profile.php?action=password');
</script>
