<script>
function toggleVisibility(btn, inputId) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    const isPassword = input.type === "password";

    input.type = isPassword ? "text" : "password";
    if (isPassword) {
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

const passwordInput = document.getElementById('password');
const strengthBar = document.getElementById('strength-bar');

passwordInput.addEventListener('input', () => {
    let v = passwordInput.value;
    let s = 0; // strength score

    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/\d/.test(v)) s++;
    if (/[\W_]/.test(v)) s++;

    const colors = ['#ff5c5c', '#ffa500', '#00d4ff', '#4cff88'];
    const widths = ['25%', '50%', '75%', '100%'];

    if (s > 0) {
        strengthBar.style.width = widths[s - 1];
        strengthBar.style.background = colors[s - 1];
    } else {
        strengthBar.style.width = v ? '10%' : '0%';
        strengthBar.style.background = colors[0];
    }
});
</script>
