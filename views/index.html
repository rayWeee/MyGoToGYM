<script>
/**
 * Function called from calendar.js whenever an event is clicked.
 * Handles updating the right-side dashboard with specific event data.
 */
window.updateSidebar = function(event) {
    const infoBox = document.getElementById("classInfo");
    const listContainer = document.getElementById("participantList");

    const title = event.title;
    const description = event.extendedProps.description || "";
    const booked = event.extendedProps.booked || 0;
    const capacity = event.extendedProps.capacity || 0;
    const isFull = booked >= capacity;
    const isPast = event.start < new Date();
    const dotColor = isPast ? '#555555' : (event.backgroundColor || '#7c5cff');
    const time = event.start ? event.start.toLocaleTimeString(window.I18N.locale, { hour: '2-digit', minute: '2-digit', hour12: false }) : "";

    // Get trainer info - checking multiple common field names for compatibility
    const trainerNameFromDb = event.extendedProps.trainer_name || event.extendedProps.creator_name || event.extendedProps.username || "";
    const creatorRoleFromDb = event.extendedProps.creator_role || event.extendedProps.role || "user";
    
    // If created by admin, use the official administration label; otherwise use the trainer's name
    const displayedTrainer = (creatorRoleFromDb.toLowerCase() === "admin") ? window.I18N.adminName : trainerNameFromDb;

    const descriptionHtml = description ? `<p style="margin-top: 15px; color: rgba(255,255,255,0.7); font-size: 0.9rem; line-height: 1.4; border-left: 2px solid #7c5cff; padding-left: 10px; font-style: italic;">${description.replace(/\n/g, '<br>')}</p>` : '';
    const isAdminOrTrainer = window.USER_ROLE === "admin" || window.USER_ROLE === "trainer";
    const hintHtml = window.USER_ID != "0" ? `<p class="muted">${window.I18N.sidebarHint}</p>` : '';

    // Update UI with event details
    infoBox.innerHTML = `
        ${isFull ? `<span class="badge-full">${window.I18N.classFull}</span>` : ''}
        <div class="info-title" style="display: flex; align-items: center; gap: 12px;">
            <span class="color-dot" style="background: ${dotColor}; width: 14px; height: 14px; flex-shrink: 0;"></span>
            <span>${title}</span>
        </div>
        <p><b>${window.I18N.time}:</b> ${time}</p>
        <p><b>${window.I18N.attendance}:</b> ${booked} / ${capacity}</p>
        <p><b>${window.I18N.trainerLabel}:</b> <span style="color: #7c5cff; font-weight: 600;">${displayedTrainer || "<i>N/A</i>"}</span></p>
        <div id="cancelContainer"></div>
        <div id="exportContainer" style="margin-top: 10px; display: flex; flex-direction: column; gap: 8px;"></div>
        
        ${isAdminOrTrainer 
            ? (descriptionHtml + hintHtml)
            : (descriptionHtml || hintHtml)
        }
    `;

    if (event.id && window.USER_ID != "0") {
        listContainer.innerHTML = `
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 0;">
                <div class="spinner"></div>
                <p style="font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-top: 12px;">${window.I18N.loadingAthletes}</p>
            </div>
        `;

        fetch(`api/get_participants.php?class_id=${event.id}`)
            .then(res => res.json())
            .then(users => {
                if (users.length === 0) {
                    listContainer.innerHTML = `<p class="muted">${window.I18N.noParticipants}</p>`;
                } else {
                    listContainer.innerHTML = `
                        <ul style="list-style: none; padding: 0; font-size: 0.9rem; display: flex; flex-direction: column; gap: 8px;">
                            ${users.map(u => `
                                <li style="display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 10px;">
                                    <span style="color: #7c5cff;">👤</span> ${u.name}
                                </li>
                            `).join('')}
                        </ul>
                        <p class="muted" style="font-size: 0.75rem; margin-top: 10px;">${window.I18N.totalJoined}: ${users.length}</p>
                    `;

                    // Show cancel button if the current user is a participant and event is not past
                    if (!isPast && users.some(u => u.id == window.USER_ID)) {
                        document.getElementById("cancelContainer").innerHTML = `
                            <button class="btn-cancel" onclick="cancelReservation(${event.id})">${window.I18N.cancelMyRes}</button>
                        `;
                    }

                    // Show export options for admin and trainer
                    if (window.USER_ROLE === "admin" || window.USER_ROLE === "trainer") {
                        document.getElementById("exportContainer").innerHTML = `
                            <button onclick="window.location.href='export/export_class_participants?class_id=${event.id}'" 
                                    style="background: #2e7d32; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600;">
                                ${window.I18N.exportExcel}
                            </button>
                            <button onclick="window.location.href='export/export_class_participants_pdf?class_id=${event.id}'" 
                                    style="background: #c62828; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600;">
                                ${window.I18N.printPdf}
                            </button>
                        `;
                    }
                }
            })
            .catch(() => {
                listContainer.innerHTML = `<p class="error">Error loading users.</p>`;
            });
    } else if (event.id) {
        listContainer.innerHTML = `<p class="muted">${window.I18N.loginToView}</p>`;
    }
};

window.cancelReservation = function(classId) {
    if(!confirm(window.I18N.confirmCancel)) return;
    
    fetch('api/cancel_reservation', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ class_id: classId })
    })
    .then(r => r.json())
    .then(data => {
        alert(data.message);
        if(data.success) {
            window.calendar.refetchEvents();
            // Clear the sidebar details to reflect the change
            document.getElementById("classInfo").innerHTML = `<p class="muted">${window.I18N.resCancelled}</p>`;
            document.getElementById("participantList").innerHTML = `<p class="muted">${window.I18N.joinMsg}</p>`;
        }
    });
};
</script>
