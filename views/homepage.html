<script>
// Auto-hide status message after 5 seconds
document.addEventListener('DOMContentLoaded', () => {
    const msg = document.getElementById('statusMsg');
    if(msg) {
        setTimeout(() => { msg.style.opacity = '0'; setTimeout(() => msg.remove(), 500); }, 5000);
    }

    // Handle "View Plans" click to scroll smoothly without adding #pricing to the URL
    const viewPlansBtn = document.getElementById('viewPlansBtn');
    if (viewPlansBtn) {
        viewPlansBtn.addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('pricing').scrollIntoView({ behavior: 'smooth' });
        });
    }
});
</script>
